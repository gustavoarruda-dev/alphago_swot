services:
  swot-app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: alphago-swot-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8005:8000"
    env_file:
      - ./.env
    depends_on:
      swot-db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      CACHE_STORE: file
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      DB_CONNECTION: pgsql
      DB_HOST: swot-db
      DB_PORT: 5432
      DB_DATABASE: alphago_swot
      DB_USERNAME: alphago_swot
      DB_PASSWORD: alphago_swot_secret
      BRAIN_BASE_URI: http://host.docker.internal:8100
    command: sh -lc "composer install --no-interaction --prefer-dist && php artisan migrate --force && php -S 0.0.0.0:8000 -t public public/index.php"

  swot-db:
    image: postgres:16-alpine
    container_name: alphago-swot-db
    environment:
      POSTGRES_DB: alphago_swot
      POSTGRES_USER: alphago_swot
      POSTGRES_PASSWORD: alphago_swot_secret
    volumes:
      - swot_pgdata:/var/lib/postgresql/data
    ports:
      - "5446:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphago_swot -d alphago_swot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  swot_pgdata:
